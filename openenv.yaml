version: "1.0"
name: "PrivacyGuard-Agent"
description: "An RL environment for identifying and redacting PII from sensitive documents."
entry_point: "env:PrivacyEnv"
tasks:
  - id: "task_1_simple"
    name: "Pattern Matching"
    difficulty: "easy"
    description: "Identify and redact basic patterns like phone numbers and emails."
  - id: "task_2_contextual"
    name: "Entity Recognition"
    difficulty: "medium"
    description: "Identify names and entities based on the surrounding context."
  - id: "task_3_legal"
    name: "High-Stakes Anonymization"
    difficulty: "hard"
    description: "Redact complex legal identifiers and dates within professional briefs."